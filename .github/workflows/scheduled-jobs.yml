name: Housing Agent Schedule

on:
  workflow_dispatch:
  schedule:
    # Near real-time polling every 15 minutes (staggered for housing at minute 2/17/32/47)
    - cron: "2,17,32,47 * * * *"

concurrency:
  group: housing-agent-schedule
  cancel-in-progress: false

jobs:
  collect-and-notify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Restore freshness state
        uses: actions/cache/restore@v4
        with:
          path: |
            outputs/housing_freshness.json
            outputs/seen_ids.json
          key: housing-freshness-${{ github.run_id }}
          restore-keys: |
            housing-freshness-

      - name: Create .env
        run: |
          cat > .env << 'EOF'
          NODE_ENV=production
          HOUSING_QUERY=Arcata studio one bedroom apartment condo house rental
          HOUSING_QUERIES=Arcata,Eureka,McKinleyville,Humboldt,studio,1 bedroom,one bedroom,1br,apartment,condo,house,rental,affordable housing,section 8,voucher
          HOUSING_REGION_LABEL=Arcata / Humboldt County area
          PROFILE_PATH=./resume/housing-profile.pdf
          MIN_RENT=500
          MAX_RENT=1700
          REQUIRE_RENT=1
          MIN_BEDROOMS=0
          MAX_BEDROOMS=1
          MIN_BATHROOMS=0
          MAX_BATHROOMS=0
          POSITIVE_SCORE_MIN=45
          MIN_PROFILE_KEYWORD_HITS=0
          TEAMS_FLOW_URL=${{ secrets.TEAMS_FLOW_URL }}
          NODE_OPTIONS=--use-system-ca
          HTTP_RETRY_ATTEMPTS=3
          HTTP_RETRY_BASE_MS=1000
          EOF

      - name: Run collector
        run: npm run collect:once

      - name: Notify Teams
        if: always()
        run: npm run notify:teams

      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: housing-agent-outputs-${{ github.run_id }}
          path: outputs/
          if-no-files-found: warn

      - name: Save freshness state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            outputs/housing_freshness.json
            outputs/seen_ids.json
          key: housing-freshness-${{ github.run_id }}
